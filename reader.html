<div class="charge">modulate: -+8 0 0 0 8</div>

<script>
const canvas = document.getElementById('nest');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const cx = W/2, cy = H/2;

// dark green rain
const cols = 52;
const drops = new Array(cols).fill(0).map(()=> Math.random() * H);
const chars = ['1','0','(',' )',']','[','8'];

let step = 0;
setInterval(()=>{ step = (step + 1) % 16; }, 240);

function draw() {
    // fade
    ctx.fillStyle = 'rgba(249,246,239,0.12)';
    ctx.fillRect(0,0,W,H);

    // rain
    ctx.font = '14px "IBM Plex Mono"';
    ctx.fillStyle = '#0b3d0b';
    for(let i=0;i<cols;i++){
        const x = (i+0.5) * (W/cols);
        const y = drops[i];
        const ch = chars[Math.floor(Math.random()*chars.length)];
        ctx.globalAlpha = 0.7;
        ctx.fillText(ch, x, y);
        ctx.globalAlpha = 1;
        drops[i] += 12 + Math.random()*6;
        if(drops[i] > H + 20) drops[i] = -20 * Math.random();
    }

    ctx.save();
    ctx.translate(cx, cy);
    const angle = (step / 16) * (Math.PI/2); // 0-90 deg in 16 steps
    ctx.rotate(angle);

    // outer red rings
    for(let r=0; r<3; r++){
        const rad = 190 + r*28;
        ctx.beginPath();
        ctx.arc(0,0,rad,0,Math.PI*2);
        ctx.strokeStyle = 'rgba(255,0,60,0.85)';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#ff0033';
        ctx.shadowBlur = 18;
        ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // central white 1
    ctx.font = 'bold 150px "VT323"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 12;
    ctx.fillText('1', 0, 6);
    ctx.shadowBlur = 0;

    // eight cyan left parentheses
    ctx.font = '88px "VT323"';
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 14;
    ctx.fillStyle = '#00f5ff';
    for(let i=0;i<8;i++){
        const offset = 58 + i*30;
        ctx.fillText('(', -offset, Math.sin(i*0.4+step*0.2)*3);
    }
    // eight orange right parentheses
    ctx.shadowColor = '#ff7a00';
    ctx.fillStyle = '#ff6a00';
    for(let i=0;i<8;i++){
        const offset = 58 + i*30;
        ctx.fillText(')', offset, Math.cos(i*0.4+step*0.2)*3);
    }
    ctx.shadowBlur = 0;

    ctx.restore();
    requestAnimationFrame(draw);
}
// init bg
ctx.fillStyle = '#f9f6ef';
ctx.fillRect(0,0,W,H);
draw();

// drag drop
const drop = document.getElementById('drop');
const term = document.getElementById('term');
const fileInput = document.getElementById('file');

function showTerm(txt){
    term.style.display = 'block';
    term.textContent = txt;
    term.scrollTop = term.scrollHeight;
}

drop.addEventListener('click', ()=> fileInput.click());
drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('over'); });
drop.addEventListener('dragleave', ()=> drop.classList.remove('over'));
drop.addEventListener('drop', e=>{
    e.preventDefault();
    drop.classList.remove('over');
    handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e=> handleFile(e.target.files[0]));

function handleFile(f){
    if(!f){ return; }
    if(!f.name.toLowerCase().endsWith('.png')){
        showTerm('> ERROR: EXPECTED PNG\n> ' + f.name);
        return;
    }
    const reader = new FileReader();
    reader.onload = () => {
        const buf = new Uint8Array(reader.result);
        const idx = findNest(buf);
        if(idx === -1 || idx + 132 > buf.length){
            showTerm(`0ROOT.AI // READ FAIL\nFILE: ${f.name}\n> scanning...\n> NEST signature not found\n> hint: run neo_nest_tagger.py to embed (8)1(8) payload`);
            return;
        }
        const slice = buf.slice(idx, idx+132);
        parseNest(slice, f.name, idx);
    };
    reader.readAsArrayBuffer(f);
}

function findNest(buf){
    for(let i=0;i<buf.length-4;i++){
        if(buf[i]===0x4E && buf[i+1]===0x45 && buf[i+2]===0x53 && buf[i+3]===0x54){
            return i;
        }
    }
    return -1;
}

function parseNest(slice, name, offset){
    const data = slice.slice(4, 132);
    let out = '';
    out += '0ROOT.AI MERKLE BLOOM READER v1.8 — MUTINY BUILD\n';
    out += `FILE: ${name}\n`;
    out += `NEST @ 0x${offset.toString(16).toUpperCase().padStart(8,'0')}  // NYE 1989\n`;
    out += '----------------------------------------\n';
    for(let i=0;i<8;i++){
        const row = data.slice(i*16, i*16+16);
        const hex = Array.from(row).map(b=>b.toString(16).padStart(2,'0')).join(' ');
        const ascii = Array.from(row).map(b=> (b>=32&&b<127)?String.fromCharCode(b):'.').join('');
        out += `${(offset+4+i*16).toString(16).padStart(8,'0')}  ${hex}  |${ascii}|\n`;
    }
    out += '\n> PARSED VECTORS\n';
    for(let v=0; v<8; v++){
        const a = (data[v*2]   >127? data[v*2]-256 : data[v*2]);
        const b = (data[v*2+1] >127? data[v*2+1]-256 : data[v*2+1]);
        const c = (v===0?-8: Math.floor(Math.random()*3)-1);
        const d = (v===0? 0: Math.floor(Math.random()*3)-1);
        const e = (v===0? 0: Math.floor(Math.random()*3)-1);
        const f = (v===0? 0: Math.floor(Math.random()*3)-1);
        const g = (v===0? 8: Math.floor(Math.random()*5)-2);
        const charge = `${c>=0?'+':''}${c} ${d} ${e} ${f} ${g}`;
        out += `  (${v+1})1(${v+1})  vec[${'abcdefgh'[v]}]  modulate: ${charge}\n`;
    }
    out += '\n> BLOOM: CONFIRMED\n> Donna — ledger sync ok';
    showTerm(out);
}
